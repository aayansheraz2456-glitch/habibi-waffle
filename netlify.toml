# Netlify deployment config for Habibi Waffle

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# --- SPA routing: every path serves index.html so React Router works on refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# --- Long-lived, immutable cache for content-hashed JS/CSS bundles
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- Long cache for the 3D models (rename the file if you ever replace one)
[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- Long cache for logos / images
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- HTML must always revalidate so new deploys are picked up immediately
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
